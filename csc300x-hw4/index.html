<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game!</title>

    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/scripts.js" defer></script>
</head>

<body>
    <div class="mainContainer">
        <div class="playerContainer">
            <div><img src="assets/imgs/rock.PNG" class="player" id="rockSelect"><p>Rock</p></div>
            <div><img src="assets/imgs/paper.PNG" class="player" id="paperSelect"><p>Paper</p></div>
            <div><img src="assets/imgs/scissors.PNG" class="player" id="scissorsSelect"><p>Scissors</p></div>
        </div>

        <div class="computer">
            <img src="assets/imgs/question-mark.PNG" id="computerResult"><p>Click img above for Computer's Choice</p>
        </div>

        <div class="results">
            <p id="winnerResult">Results here: </p>
        </div>
    </div>
</body>

</html>
